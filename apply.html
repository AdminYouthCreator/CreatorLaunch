<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for the Winter Workshop | CreatorLaunch</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'primary': '#F55F55', 'accent': '#387ADF', 'light': '#F7F9FC', 'dark': '#2D3748', 'medium': '#4A5568' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<body class="text-dark">
    <div id="header-placeholder"></div>
    <main>
        <section class="relative py-24 md:py-32 bg-primary text-center overflow-hidden">
            <div class="absolute inset-0 z-0 opacity-20"><div class="w-full h-full bg-gradient-to-br from-white/20 to-transparent"></div></div>
            <div class="container mx-auto px-6 relative z-10">
                <h1 class="text-5xl sm:text-6xl font-black">Apply for Winter Workshop.</h1>
                <p class="text-xl md:text-2xl font-light text-red-100 max-w-3xl mx-auto mb-10">Secure your spot in our free, 6-week business building program for St. Louis teens.</p>
            </div>
        </section>
        <section id="application-form" class="py-20 sm:py-28 bg-white">
            <div class="container mx-auto px-6 max-w-xl text-center">
                <div class="application-form-card">
                    <h2 class="text-4xl sm:text-5xl font-bold text-dark mb-8">Ready to Launch Your Legacy?</h2>
                    <p class="text-lg text-medium leading-relaxed mb-8">Spots are very limited. Apply now to secure your place in this transformative program!</p>
                    <div style="width:100%;height:500px;" data-fillout-id="m4UjDNEbTfus" data-fillout-embed-type="standard" data-fillout-inherit-parameters data-fillout-dynamic-resize></div><script src="https://server.fillout.com/embed/v1/"></script>
                    <p class="text-medium mt-4 text-lg">We can't wait to review your application!</p>
                </div>
            </div>
        </section>

    <div id="footer-placeholder"></div>
    <script src="/assets/js/script.js"></script>
